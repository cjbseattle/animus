kind = "web"
previewPath = "/"
title = "Animus"
version = "1.0.0"
id = "artifacts/animus"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25142

[services.development]
run = "pnpm --filter @workspace/animus run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/animus", "run", "build" ]
publicDir = "artifacts/animus/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25142"
BASE_PATH = "/"
