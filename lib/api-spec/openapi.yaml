openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Animus SAT Prep API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: questions
    description: SAT question operations
  - name: answers
    description: Answer submission operations
  - name: users
    description: User stats and currency
  - name: break
    description: Scroll break content
  - name: shop
    description: Shop and power-up operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /questions/daily:
    get:
      operationId: getDailyQuestion
      tags: [questions]
      summary: Get today's daily challenge question
      responses:
        "200":
          description: Daily question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"

  /questions/random:
    get:
      operationId: getRandomQuestion
      tags: [questions]
      summary: Get a random SAT question
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [math, reading]
        - name: difficulty
          in: query
          required: false
          schema:
            type: string
            enum: [easy, medium, hard]
        - name: excludeIds
          in: query
          required: false
          schema:
            type: string
            description: Comma-separated list of question IDs to exclude
      responses:
        "200":
          description: Random question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"

  /questions:
    get:
      operationId: listQuestions
      tags: [questions]
      summary: List questions with optional type filter
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [math, reading]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"

  /answers:
    post:
      operationId: submitAnswer
      tags: [answers]
      summary: Submit an answer to a question
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnswerInput"
      responses:
        "200":
          description: Answer result with updated user stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnswerResult"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user stats
      responses:
        "200":
          description: User stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStats"

  /users/me/stats:
    get:
      operationId: getMeStats
      tags: [users]
      summary: Get detailed user performance stats
      responses:
        "200":
          description: Detailed user performance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPerformance"

  /break/content:
    get:
      operationId: getBreakContent
      tags: [break]
      summary: Get scroll break content (reels)
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of break content items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BreakContent"

  /shop/items:
    get:
      operationId: getShopItems
      tags: [shop]
      summary: Get all available shop items
      responses:
        "200":
          description: List of shop items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShopItem"

  /shop/purchase:
    post:
      operationId: purchaseItem
      tags: [shop]
      summary: Purchase a power-up with currency
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseInput"
      responses:
        "200":
          description: Purchase result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseResult"
        "400":
          description: Insufficient currency or invalid item

  /users/me/powerups:
    get:
      operationId: getMyPowerups
      tags: [users]
      summary: Get current user's owned power-ups
      responses:
        "200":
          description: User power-ups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserPowerup"

  /users/me/username:
    put:
      operationId: updateUsername
      tags: [users]
      summary: Update the current user's display name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUsernameInput"
      responses:
        "200":
          description: Updated user stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserStats"

  /users/me/activity:
    get:
      operationId: getMyActivity
      tags: [users]
      summary: Get the user's daily practice activity for the past N days
      parameters:
        - name: days
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Array of daily activity entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyActivity"

  /users/me/missed-questions:
    get:
      operationId: getMissedQuestions
      tags: [users]
      summary: Get questions the user misses most frequently
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Frequently missed questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MissedQuestion"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Question:
      type: object
      required: [id, type, content, choices, difficulty]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [math, reading]
        content:
          type: string
        passage:
          type: ["string", "null"]
        choices:
          type: array
          items:
            $ref: "#/components/schemas/Choice"
        difficulty:
          type: string
          enum: [easy, medium, hard]
        explanation:
          type: ["string", "null"]

    Choice:
      type: object
      required: [id, label, text]
      properties:
        id:
          type: string
        label:
          type: string
        text:
          type: string

    AnswerInput:
      type: object
      required: [questionId, choiceId, userId]
      properties:
        questionId:
          type: integer
        choiceId:
          type: string
        userId:
          type: integer

    AnswerResult:
      type: object
      required: [isCorrect, correctChoiceId, explanation, currencyEarned, newStreak, streakMultiplier, totalCurrency, breakUnlocked]
      properties:
        isCorrect:
          type: boolean
        correctChoiceId:
          type: string
        explanation:
          type: string
        currencyEarned:
          type: integer
        newStreak:
          type: integer
        streakMultiplier:
          type: number
        totalCurrency:
          type: integer
        breakUnlocked:
          type: boolean
        consecutiveCorrect:
          type: integer

    UserStats:
      type: object
      required: [id, username, currency, currentStreak, longestStreak, totalCorrect, totalAnswered, consecutiveCorrect]
      properties:
        id:
          type: integer
        username:
          type: string
        currency:
          type: integer
        currentStreak:
          type: integer
        longestStreak:
          type: integer
        totalCorrect:
          type: integer
        totalAnswered:
          type: integer
        consecutiveCorrect:
          type: integer

    UserPerformance:
      type: object
      required: [totalAnswered, totalCorrect, mathCorrect, mathAnswered, readingCorrect, readingAnswered, accuracy, mathAccuracy, readingAccuracy]
      properties:
        totalAnswered:
          type: integer
        totalCorrect:
          type: integer
        mathCorrect:
          type: integer
        mathAnswered:
          type: integer
        readingCorrect:
          type: integer
        readingAnswered:
          type: integer
        accuracy:
          type: number
        mathAccuracy:
          type: number
        readingAccuracy:
          type: number

    BreakContent:
      type: object
      required: [id, type, url, caption]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [video, image, gif]
        url:
          type: string
        caption:
          type: string
        thumbnailUrl:
          type: ["string", "null"]

    ShopItem:
      type: object
      required: [id, name, description, cost, type, icon]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        cost:
          type: integer
        type:
          type: string
          enum: [hint, skip, shield]
        icon:
          type: string

    PurchaseInput:
      type: object
      required: [itemId, userId]
      properties:
        itemId:
          type: string
        userId:
          type: integer

    PurchaseResult:
      type: object
      required: [success, remainingCurrency, powerupType, newQuantity]
      properties:
        success:
          type: boolean
        remainingCurrency:
          type: integer
        powerupType:
          type: string
        newQuantity:
          type: integer

    UserPowerup:
      type: object
      required: [type, quantity]
      properties:
        type:
          type: string
          enum: [hint, skip, shield]
        quantity:
          type: integer

    MissedQuestion:
      type: object
      required: [id, type, content, difficulty, missCount, attempts]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [math, reading]
        content:
          type: string
        passage:
          type: ["string", "null"]
        difficulty:
          type: string
          enum: [easy, medium, hard]
        missCount:
          type: integer
        attempts:
          type: integer

    UpdateUsernameInput:
      type: object
      required: [username]
      properties:
        username:
          type: string

    DailyActivity:
      type: object
      required: [date, count, correct]
      properties:
        date:
          type: string
        count:
          type: integer
        correct:
          type: integer
